<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: transparent;">
    <div id="alerta" style="font-size: 50px; color: white; font-family: sans-serif; text-shadow: 2px 2px 4px #000;">
    
    </div>
    <script>
  try {
    const supabase = supabase.createClient(
      "https://vpvjbkgiivmkgvmngkpg.supabase.co",
      "sb_publishable_VduZ0tLuv8v1R3xiU-9Ysw_nZEadoS0"
    );
    console.log("Supabase cargó correctamente");
    
    supabase
      .channel('public:regalos')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'regalos' }, payload => {
        console.log("¡Regalo detectado!");
        document.getElementById('alerta').innerText = '¡Nuevo regalo recibido!';
        setTimeout(() => { document.getElementById('alerta').innerText = ''; }, 5000);
      })
      .subscribe();
      
  } catch (e) {
    console.error("Error al cargar Supabase:", e);
  }
</script>
